<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="{% url 'home' %}">Home</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            
            {% if request.user.is_authenticated %}
            
            <ul class="navbar-nav">
         
              <li class="nav-item">
                <a class="nav-link mx-4 " href="{% url 'product' %}">Add</a>
              </li>
              <li class="nav-item">
                <a class="nav-link mx-4  " href="{% url 'account' %}">Account</a>
              </li>
              
              <li class="nav-item">
                <a class="nav-link mx-4  " href="{% url 'about' %}">Cart</a>
              </li>
              
              <div class="container-fluid mx-5">
                <form class="d-flex" role="search" method='GET' action='/search/'>
                  <input class="form-control me-2 border-primary px-5 " name='query' type="search" placeholder="Search product here.." aria-label="Search">
                  <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
              </div>

              


              <li class="nav-item">
                <a class="nav-link mx-5 btn btn-danger text-white " href="{% url 'logout' %}">Logout</a>
              </li>
           

            </ul>

            {% else %}

            <ul class="navbar-nav">
                <li class="nav-item">
                  <a class="nav-link mx-3 btn text-dark " aria-current="page" href="{% url 'signup' %}">Signup</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link mx-4 btn text-dark  " href=" {% url 'login' %} ">Login</a>
                </li>
             
              </ul>

            {% endif %}

          </div>
        </div>
      </nav>



    {% block content %}


    {% endblock  %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>


</body>
</html>
